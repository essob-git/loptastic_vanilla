    <script>
// Custom Markdown Erweiterung für underline (__text__) und strike (--text--)
marked.use({
  extensions: [
    {
      name: 'underline',
      level: 'inline', // inline token
      start(src) { return src.match(/__/)?.index; },
      tokenizer(src) {
        const rule = /^__([^_]+?)__/; // __Text__
        const match = rule.exec(src);
        if (match) {
          return {
            type: 'underline',
            raw: match[0],
            text: match[1],
          };
        }
      },
      renderer(token) {
        return `<u>${token.text}</u>`;
      },
    },
    {
      name: 'strikeAlt',
      level: 'inline',
      start(src) { return src.match(/--/)?.index; },
      tokenizer(src) {
        const rule = /^--([^-\n]+?)--/; // --Text--
        const match = rule.exec(src);
        if (match) {
          return {
            type: 'strikeAlt',
            raw: match[0],
            text: match[1],
          };
        }
      },
      renderer(token) {
        return `<del>${token.text}</del>`;
      },
    },
  ],
});

        (function () {
            const container = document.querySelector('.lop-container');
            const toggleBtn = document.getElementById('sidebar-toggle');
            const icon = toggleBtn.querySelector('i');

            const setAria = (expanded) => {
                toggleBtn.setAttribute('aria-expanded', String(expanded));
                toggleBtn.setAttribute('title', expanded ? 'Sidebar ausblenden' : 'Sidebar einblenden');
                icon.classList.toggle('bi-chevron-left', expanded);
                icon.classList.toggle('bi-chevron-right', !expanded);
            };

            // Initialzustand: Sidebar sichtbar
            setAria(true);

            toggleBtn.addEventListener('click', () => {
                const willCollapse = !container.classList.contains('sidebar-collapsed');
                container.classList.toggle('sidebar-collapsed', willCollapse);
                setAria(!willCollapse);
            });

            // Optional: Mit Taste "S" toggeln (nur wenn keine Eingabe aktiv)
            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 's' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
                    toggleBtn.click();
                }
            });
        })();
    </script>
